name: CI

# Controls when the action will run. 
on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'     
        required: false
        default: 'no'
  release:
    types: [published]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: build
    runs-on: ubuntu-22.04
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    env:
      build_variant: ${{ matrix.build_variant }}
      targets: ${{ matrix.targets }}
      images_dir: /opt/images
    strategy:
      matrix:
        include:
          # 注释掉无关变体，仅保留需要的 mt7621-usb-1（避免重复编译）
          #- build_variant: "mt7621"
          #  targets: "K2P_nano K2P DIR-878 CR660x JCG-Q20 JDCLOUD-RE-CP-02"
          - build_variant: "mt7621-usb-1"
            targets: "JDCLOUD-RE-CP-02"  # 仅编译京东云鲁班，无多余型号
            #targets: "XY-C1 JCG-836PRO JCG-Y2"
          # 注释掉重复的 mt7621-usb-2（避免同一型号编译两次）
          #- build_variant: "mt7621-usb-2"
          #  targets: "JDCLOUD-RE-CP-02"
          #targets: "DIR-882 JCG-AC860M NETGEAR-BZV MI-R3P"
    steps:
      - uses: actions/checkout@v4  # 升级到稳定新版，提升兼容性（原 v2 无报错但推荐更新）
        with:
          repository: mobing8/JDC02-padavan-4.4
          ref: main
          fetch-depth: 1
      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext  # 加 -y 自动确认，避免交互卡壳
      - name: Run shellcheck
        run: sh ./trunk/tools/shellcheck.sh
      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'yes' }}
        with:
          limit-access-to-actor: true
      - name: Start build
        run: |
          cd trunk
          mkdir -p ${images_dir}
          for m in $targets; do fakeroot ./build_firmware_ci $m; \
          if [ $? = 0 ]; then cp -f images/*.trx ${images_dir}/$m.trx; else exit 1; fi; \
          ./clear_tree_simple >/dev/null 2>&1; done
      - name: Create archive
        if: ${{ github.event_name != 'release' && success() }}
        run: |
          ls -lh ${images_dir}
          GIT_VERSION=`git rev-parse --short=7 HEAD 2>/dev/null` && [ -n "$GIT_VERSION" ] && \
          image_name=images_${build_variant}_${GIT_VERSION} || image_name=images_${build_variant}
          cd ${images_dir}; md5sum *.trx |tee md5sum.txt; 7z a -mx=9 ${image_name}.7z ./*
          echo "image_name=${image_name}" >> $GITHUB_ENV
      - name: Upload images to Artifact
        if: ${{ github.event_name != 'release' && success() }}
        uses: actions/upload-artifact@v4  # 核心修复：升级到 GitHub 支持的稳定新版（原 v2.2.1 已废弃）
        with:
          name: ${{ env.image_name }}
          path: ${{ env.images_dir }}/*.7z
          retention-days: 30  # 新增： artifacts 保留 30 天（可选，避免占用仓库空间）
      - name: Upload images to Releases
        if: ${{ github.event_name == 'release' && success() }}
        uses: svenstaro/upload-release-action@v2.2.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.images_dir }}/*.trx
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
