name: CI

on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate debugging enabled'     
        required: false
        default: 'no'
  release:
    types: [published]

jobs:
  build:
    name: build
    runs-on: ubuntu-22.04
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    env:
      build_variant: ${{ matrix.build_variant }}
      targets: ${{ matrix.targets }}
      images_dir: /opt/images
    strategy:
      matrix:
        include:
          - build_variant: "mt7621-usb-1"
            targets: "JDCLOUD-RE-CP-02"  # 仅编译京东云鲁班      
    steps:
      # 步骤1：拉取主仓库代码
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      # 步骤2：安装编译依赖（补充MIPS小端交叉工具）
      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext \
          libc6-dev-mipsel-cross gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu

      # 步骤3：运行代码检查
      - name: Run shellcheck
        run: sh ./trunk/tools/shellcheck.sh

      # 步骤4：准备编译工具链
      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh

      # 步骤5：调试会话
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'yes' }}
        with:
          limit-access-to-actor: true

      # 步骤6：开始编译固件（100%规范Shell语法，无错误）
      - name: Start build
        run: |
          # 指定使用bash解释器，避免Shell差异
          #!/bin/bash
          
          # 进入trunk目录（失败则强制退出）
          cd trunk || exit 1
          
          # 给所有.sh脚本添加可执行权限（递归覆盖子目录）
          find . -type f -name "*.sh" -exec chmod +x {} \;
          
          # 给核心编译/清理脚本单独加权限（双重保障）
          chmod +x build_firmware_ci build_firmware_modify clear_tree clear_tree_simple
          
          # 完整清理编译缓存（忽略输出）
          ./clear_tree >/dev/null 2>&1
          
          # 创建固件存储目录（确保目录存在）
          mkdir -p "${images_dir}"
          
          # 遍历目标设备（仅JDCLOUD-RE-CP-02）
          for device in ${targets}; do
            echo "开始编译设备：${device}"
            
            # 执行编译脚本（单线程-j1，避免依赖冲突）
            fakeroot ./build_firmware_ci "${device}" -j1
            
            # 检查编译结果：失败则输出错误并退出
            if [ $? -ne 0 ]; then
              echo "编译失败：设备${device}"
              exit 1
            fi
            
            # 复制固件到存储目录
            cp -f images/*.trx "${images_dir}/${device}.trx"
            echo "编译成功：设备${device}，固件已保存到${images_dir}"
            
            # 清理当前设备的编译缓存
            ./clear_tree >/dev/null 2>&1
          done

      # 步骤7：打包固件
      - name: Create archive
        if: ${{ github.event_name != 'release' && success() }}
        run: |
          ls -lh ${images_dir}
          GIT_VERSION=$(git rev-parse --short=7 HEAD 2>/dev/null)
          image_name="images_${build_variant}_${GIT_VERSION:-default}"
          cd ${images_dir}
          md5sum *.trx > md5sum.txt
          7z a -mx=9 "${image_name}.7z" ./*
          echo "image_name=${image_name}" >> $GITHUB_ENV

      # 步骤8：上传固件到Artifacts
      - name: Upload images to Artifact
        if: ${{ github.event_name != 'release' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.image_name }}
          path: ${{ env.images_dir }}/*.7z
          retention-days: 30

      # 步骤9：上传固件到Releases
      - name: Upload images to Releases
        if: ${{ github.event_name == 'release' && success() }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.images_dir }}/*.trx
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
