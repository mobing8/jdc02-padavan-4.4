name: CI

on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate debugging enabled'     
        required: false
        default: 'no'
  release:
    types: [published]

jobs:
  build:
    name: build
    runs-on: ubuntu-22.04
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    env:
      build_variant: ${{ matrix.build_variant }}
      targets: ${{ matrix.targets }}
      images_dir: /opt/images
    strategy:
      matrix:
        include:
          - build_variant: "mt7621-usb-1"
            targets: "JDCLOUD-RE-CP-02"      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext \
          libc6-dev-mipsel-cross gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu

      - name: Run shellcheck
        run: sh ./trunk/tools/shellcheck.sh

      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'yes' }}
        with:
          limit-access-to-actor: true

      # 彻底重写的Start build步骤（无语法错误）
      - name: Start build
        run: |
          # 进入trunk目录，失败则退出
          cd trunk || { echo "Failed to enter trunk directory"; exit 1; }
          
          # 给所有.sh脚本添加可执行权限
          find . -type f -name "*.sh" -exec chmod +x {} \;
          
          # 给核心编译脚本加权限
          chmod +x build_firmware_ci build_firmware_modify clear_tree clear_tree_simple
          
          # 清理编译缓存
          ./clear_tree >/dev/null 2>&1
          
          # 创建固件存储目录
          mkdir -p "${images_dir}"
          
          # 编译目标设备
          for device in ${targets}; do
            echo "Building firmware for ${device}"
            # 执行编译（单线程）
            fakeroot ./build_firmware_ci "${device}" -j1
            
            # 检查编译结果
            if [ $? -ne 0 ]; then
              echo "Build failed for ${device}"
              exit 1
            fi
            
            # 复制固件
            cp -f images/*.trx "${images_dir}/${device}.trx"
            echo "Build succeeded for ${device}"
            
            # 清理缓存
            ./clear_tree >/dev/null 2>&1
          done

      - name: Create archive
        if: ${{ github.event_name != 'release' && success() }}
        run: |
          ls -lh ${images_dir}
          GIT_VERSION=$(git rev-parse --short=7 HEAD 2>/dev/null)
          image_name="images_${build_variant}_${GIT_VERSION:-default}"
          cd ${images_dir}
          md5sum *.trx > md5sum.txt
          7z a -mx=9 "${image_name}.7z" ./*
          echo "image_name=${image_name}" >> $GITHUB_ENV

      - name: Upload images to Artifact
        if: ${{ github.event_name != 'release' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.image_name }}
          path: ${{ env.images_dir }}/*.7z
          retention-days: 30

      - name: Upload images to Releases
        if: ${{ github.event_name == 'release' && success() }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.images_dir }}/*.trx
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
