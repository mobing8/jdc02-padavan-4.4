name: CI

on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate debugging enabled'     
        required: false
        default: 'yes'  # 方便调试时开启tmate
  release:
    types: [published]

jobs:
  build:
    name: build
    runs-on: ubuntu-22.04
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    env:
      build_variant: ${{ matrix.build_variant }}
      targets: ${{ matrix.targets }}
      images_dir: ./output/images  # 工作目录内路径，避免权限问题
    strategy:
      matrix:
        include:
          - build_variant: "mt7621-usb-1"
            targets: "JDCLOUD-RE-CP-02"      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史
          persist-credentials: false

      - name: Prepare environment
        run: |
          sudo apt update
          # 安装基础依赖+系统自带工具（替代缺失的源码工具）
          sudo apt install -y \
            libtool-bin gperf python3-docutils autopoint gettext \
            libc6-dev-mipsel-cross gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu \
            fakeroot shellcheck p7zip-full \
            squashfs-tools  # 系统自带squashfs工具，替代可能缺失的iksquashfs-xz
          # 验证系统工具是否安装成功
          echo "检查系统squashfs工具："
          which mksquashfs || echo "警告：squashfs-tools未安装"

      - name: Run shellcheck (仅检查现有脚本)
        run: |
          # 只检查trunk/tools下现有的shell脚本，避免依赖缺失文件
          sh ./trunk/tools/shellcheck.sh || echo "shellcheck警告：部分脚本可能存在语法问题"

      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh
          # 工具链路径添加到PATH
          echo "PATH=$PATH:$(pwd)/bin" >> $GITHUB_ENV
          # 验证工具链是否可用
          echo "检查交叉编译器："
          which mipsel-linux-gnu-gcc || echo "警告：交叉编译器未找到"

      - name: Setup tmate session (调试用)
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'yes' }}
        with:
          limit-access-to-actor: true

      - name: Start build (仅依赖现有工具)
        run: |
          cd trunk
          # 1. 递归赋予所有现有脚本执行权限（核心步骤）
          echo "===== 给所有工具脚本赋予执行权限 ====="
          # 核心构建脚本
          chmod +x ./build_firmware_ci ./build_firmware_modify ./clear_tree_simple ./clear_tree
          # tools目录下的所有.sh脚本（含子目录）
          find ./tools -name "*.sh" -exec chmod +x {} \;
          # tools目录下的可执行工具（如mk squashfs.xz等）
          find ./tools -type f -executable -exec chmod +x {} \;
          # 验证权限（可选，调试用）
          echo "===== 验证关键脚本权限 ====="
          ls -l ./build_firmware_ci ./tools/mk* ./tools/*.sh | grep -E "x.*x.*x"

          # 2. 复制配置文件（确保使用你的京东云配置）
          echo "===== 加载京东云设备配置 ====="
          cp configs/templates/JDCLOUD-RE-CP-02.config .config
          ls -l .config || echo "警告：配置文件复制失败"

          # 3. 确保输出目录存在
          mkdir -p ${images_dir}

          # 4. 执行构建（使用系统工具替代缺失依赖）
          for m in $targets; do
            echo "===== 开始构建目标：$m ====="
            # 构建时优先使用系统工具（通过环境变量指定）
            export PATH="/usr/bin:$PATH"  # 系统工具路径优先于源码工具
            fakeroot ./build_firmware_ci $m

            # 检查构建结果
            if [ $? -ne 0 ]; then
              echo "❌ 目标 $m 构建失败，终止流程！"
              exit 1
            fi

            # 检查固件产物
            trx_files=$(ls images/*.trx 2>/dev/null | wc -l)
            if [ $trx_files -eq 0 ]; then
              echo "❌ 目标 $m 未生成.trx固件！"
              exit 1
            fi

            # 复制固件到输出目录
            cp -f images/*.trx ${images_dir}/$m.trx
            echo "✅ 目标 $m 构建完成，固件路径：${images_dir}/$m.trx"

            # 清理构建残留
            ./clear_tree_simple >/dev/null 2>&1
          done

      - name: Create archive
        if: ${{ github.event_name != 'release' && success() }}
        run: |
          ls -lh ${images_dir}  # 查看输出
          GIT_VERSION=$(git rev-parse --short=7 HEAD 2>/dev/null)
          image_name="images_${build_variant}_${GIT_VERSION:-default}"
          cd ${images_dir}
          md5sum *.trx > md5sum.txt
          7z a -mx=9 "${image_name}.7z" ./*
          echo "image_name=${image_name}" >> $GITHUB_ENV

      - name: Upload images to Artifact
        if: ${{ github.event_name != 'release' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.image_name }}
          path: ${{ env.images_dir }}/*.7z
          retention-days: 30

      - name: Upload images to Releases
        if: ${{ github.event_name == 'release' && success() }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.images_dir }}/*.trx
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
