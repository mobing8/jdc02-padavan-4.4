name: CI

# Controls when the action will run. 
on: 
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'     
        required: false
        default: 'no'
  release:
    types: [published]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: build
    runs-on: ubuntu-20.04
    if: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    env:
      build_variant: ${{ matrix.build_variant }}
      targets: ${{ matrix.targets }}
      images_dir: /opt/images
    strategy:
      matrix:
        include:
          # 仅保留京东云鲁班（JDCLOUD-RE-CP-02），删除其他无关设备，避免多余编译
          - build_variant: "mt7621-usb-1"
            targets: "JDCLOUD-RE-CP-02"
    steps:
      # 升级checkout到v4，拉取当前仓库代码（无需指定外部仓库）
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      # 补充MIPS小端交叉编译依赖，解决汇编文件编译问题
      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libtool-bin gperf python3-docutils autopoint gettext \
          libc6-dev-mipsel-cross gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu

      # 运行代码检查（保留原逻辑）
      - name: Run shellcheck
        run: sh ./trunk/tools/shellcheck.sh

      # 准备编译工具链（保留原逻辑）
      - name: Prepare toolchain
        run: |
          cd toolchain-mipsel
          sh dl_toolchain.sh

      # 调试会话（保留原逻辑）
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_enabled == 'yes' }}
        with:
          limit-access-to-actor: true

      # 核心编译步骤：加权限+完整清理缓存+单线程编译
      - name: Start build
        run: |
          cd trunk
          # 批量给所有.sh脚本加可执行权限（包括子目录工具脚本）
          find . -name "*.sh" -exec chmod +x {} \;
          # 给编译/清理脚本单独加权限（双重保障）
          chmod +x build_firmware_ci build_firmware_modify clear_tree clear_tree_simple
          # 完整清理编译缓存，避免残留冲突
          ./clear_tree >/dev/null 2>&1
          # 创建固件存储目录
          mkdir -p ${images_dir}
          # 单线程编译（-j1），确保依赖顺序正确，解决"无规则生成目标"问题
          for m in $targets; do 
            fakeroot ./build_firmware_ci $m -j1
            # 检查编译是否成功，失败则退出
            if [ $? = 0 ]; then 
              cp -f images/*.trx ${images_dir}/$m.trx
            else 
              exit 1
            fi
            # 编译完成后再次清理缓存
            ./clear_tree >/dev/null 2>&1
          done

      # 打包固件（保留原逻辑）
      - name: Create archive
        if: ${{ github.event_name != 'release' && success() }}
        run: |
          ls -lh ${images_dir}
          GIT_VERSION=`git rev-parse --short=7 HEAD 2>/dev/null` && [ -n "$GIT_VERSION" ] && \
          image_name=images_${build_variant}_${GIT_VERSION} || image_name=images_${build_variant}
          cd ${images_dir}; md5sum *.trx |tee md5sum.txt; 7z a -mx=9 ${image_name}.7z ./*
          echo "image_name=${image_name}" >> $GITHUB_ENV

      # 升级Artifact上传到v4，保留30天（避免占用仓库空间）
      - name: Upload images to Artifact
        if: ${{ github.event_name != 'release' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.image_name }}
          path: ${{ env.images_dir }}/*.7z
          retention-days: 30

      # 上传固件到Releases（保留原逻辑，升级插件版本）
      - name: Upload images to Releases
        if: ${{ github.event_name == 'release' && success() }}
        uses: svenstaro/upload-release-action@v2.2.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.images_dir }}/*.trx
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
